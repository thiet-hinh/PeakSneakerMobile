version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: shoe-store-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1
      MYSQL_DATABASE: shoe_store
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/java/com/example/shoestore/sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

volumes:
  mysql_data: